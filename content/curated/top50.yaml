# chronoscroll トップ50キュレーション
# 自動生成イベントを id で上書きする（title/summary/importance/svg/分類/日付精度）
# importance: 100 = 最遠ズーム（概観）で必ず表示される層。全件オリジナルSVG付き。

- id: 1868-02-08-13b8b41d
  title: 明治維新——新政府が王政復古を世界に宣言
  summary: 王政復古の大号令を経て成立した明治新政府が、諸外国公使に天皇親政の開始を通告し、開国和親の方針を宣言した。武家政権の終わりとともに、日本の近代国家への歩みが始まった。
  importance: 100
  svg: art-meiji-ishin
  category: politics
  region: japan

- id: 1869-11-17-9a56a6bc
  title: スエズ運河が開通
  summary: 地中海と紅海を結ぶ全長約160kmのスエズ運河が、10年の難工事を経て開通した。ヨーロッパとアジアを結ぶ航路は大幅に短縮され、世界の海運と貿易の姿を一変させた。
  importance: 100
  svg: art-suez-canal
  category: economy
  region: world

- id: 1872-10-14-098bca3d
  title: 新橋–横浜間に日本初の鉄道が開業
  summary: 明治5年、新橋–横浜間29kmを約53分で結ぶ日本初の鉄道が正式開業した。陸蒸気と呼ばれた汽車は文明開化の象徴として人々を驚かせ、この日は後に「鉄道の日」となった。
  importance: 100
  svg: art-first-railway
  category: science
  region: japan

- id: 1876-03-10-397763b3
  title: ベルが電話の実用化に成功
  summary: 「ワトソン君、ちょっとこっちに来てくれないか」——グラハム・ベルが世界初の実用的な電話通話に成功した。人の声が電線を伝わる時代が、この一言から幕を開けた。
  importance: 100
  svg: art-bell-telephone
  category: science
  region: world

- id: 1889-02-11-c4d09e8e
  title: 大日本帝国憲法を発布
  summary: アジア初の近代成文憲法として大日本帝国憲法が発布された。天皇主権のもとに帝国議会や裁判所の制度が整えられ、日本は立憲国家としての体裁を整えた。
  importance: 100
  svg: art-meiji-constitution
  category: politics
  region: japan

- id: 1889-03-31-c70f6fd5
  title: エッフェル塔が完成
  summary: パリ万国博覧会に合わせ、高さ300mの鉄塔が完成した。当時世界一の高さを誇り、「醜い鉄の塊」と賛否を巻き起こしながらも、やがてパリそのものの象徴となった。
  importance: 100
  svg: art-eiffel-tower
  category: culture
  region: world

- id: 1894-08-01-c83f0c49
  title: 日清戦争が開戦
  summary: 朝鮮半島をめぐる対立から、日本と清が相互に宣戦布告した。近代日本初の本格的な対外戦争は翌年の下関条約締結まで続き、東アジアの勢力図を大きく塗り替えた。
  importance: 100
  svg: art-sino-japanese-war
  category: war
  region: both

- id: 1895-12-28-eab508c7
