  summary: 「暗黒の木曜日」、ニューヨーク証券取引所で株価が大暴落した。恐慌は瞬く間に世界へ波及し、失業と保護主義の連鎖が1930年代の世界を長く揺さぶり続けた。
  importance: 100
  svg: art-great-depression
  category: economy
  region: world

- id: 1931-09-18-17940576
