  summary: 日本軍がハワイ真珠湾の米艦隊を奇襲し、同時にマレー半島へ上陸した。日本は米英に宣戦布告し、太平洋戦争が始まった。「トラ・トラ・トラ」の暗号電文は奇襲成功を告げた。
  importance: 100
  svg: art-pearl-harbor
  category: war
  region: both

