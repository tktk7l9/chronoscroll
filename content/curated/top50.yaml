  summary: ピエールとマリのキュリー夫妻が、新元素ラジウムの発見を発表した。放射能研究の扉を開く成果であり、マリは後に女性初のノーベル賞受賞者となった。
  importance: 100
  svg: art-radium-discovery
  category: science
  region: world

- id: 1903-12-17-8fe33c91
  title: ライト兄弟が人類初の動力飛行
  summary: 米ノースカロライナ州キティホークの砂丘で、ライト兄弟のフライヤー号が人類初の動力飛行に成功した。最初の飛行はわずか12秒・36m——だが空の時代はここから始まった。
  importance: 100
  svg: art-wright-flyer
  category: science
  region: world

- id: 1904-02-04-3854e92f
  title: 日露戦争が始まる
  summary: 御前会議で対露交渉の打ち切りと軍事行動の開始が決定された。数日後の旅順口攻撃をもって日露戦争が始まり、新興国日本と大国ロシアの戦いは世界の注目を集めた。
  importance: 100
  svg: art-russo-japanese-war
  category: war
  region: both

- id: 1905-06-30-18f5d965
  title: アインシュタインが特殊相対性理論を発表
  summary: 26歳の特許局員アインシュタインが論文「運動物体の電気力学について」を発表。時間と空間は絶対ではないという洞察は物理学の常識を覆し、「奇跡の年」の代表的成果となった。
  importance: 100
  svg: art-relativity
  category: science
  region: world

- id: 1912-04-14-7c89b5cd
  title: タイタニック号が沈没
  summary: 「不沈船」と謳われた豪華客船タイタニック号が、処女航海中に氷山と衝突し北大西洋に沈んだ。1,500人以上が犠牲となり、海難史上最悪級の事故として記憶されている。
  importance: 100
  svg: art-titanic
  category: disaster
  region: world

- id: 1914-07-28-717607be
  title: 第一次世界大戦が勃発
  summary: サラエボ事件を引き金に、オーストリア＝ハンガリーがセルビアへ宣戦布告した。同盟の網が連鎖してヨーロッパ全体が戦火に包まれ、人類初の世界大戦へと拡大していった。
  importance: 100
  svg: art-ww1
  category: war
  region: world

- id: 1918-11-11-7c1b62dd
  title: 第一次世界大戦が終結
  summary: 連合国とドイツが休戦協定に調印し、4年余りに及んだ大戦が終わった。犠牲者は軍民あわせて1,600万人以上。世界は「二度と戦争を繰り返さない」ための模索を始める。
  importance: 100
  svg: art-ww1-armistice
  category: war
  region: world

- id: 1923-09-01-3eedb04e
  title: 関東大震災が発生
  summary: 9月1日午前11時58分、M7.9の地震が関東南部を直撃した。昼食時の火災が被害を拡大し、死者・行方不明者は約10万5千人に及んだ。この日は後に「防災の日」と定められた。
  importance: 100
  svg: art-kanto-earthquake
  category: disaster
  region: japan

- id: 1927-05-21-b4e70bb6
  title: リンドバーグが大西洋単独無着陸横断
  summary: スピリット・オブ・セントルイス号でニューヨークからパリまで約5,800kmを33時間半で飛行。世界初の大西洋単独無着陸横断は、大西洋を「飛んで渡れる海」に変えた。
  importance: 100
  svg: art-lindbergh
  category: science
  region: world

- id: 1929-10-24-b6eff5a3
