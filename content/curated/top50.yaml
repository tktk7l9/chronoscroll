  summary: 雪の東京で、陸軍青年将校らが約1,500名の兵を率いて首相官邸などを襲撃し、高橋是清蔵相らを殺害した。クーデターは鎮圧されたが、軍部の発言力は決定的に強まった。
  importance: 100
  svg: art-226-incident
  category: war
  region: japan

- id: 1939-09-01-7583d835
  title: 第二次世界大戦が勃発
  summary: ナチス・ドイツがポーランドへ侵攻を開始した。英仏の対独宣戦布告が続き、第一次大戦の終結からわずか20年で、世界は再び大戦の渦に飲み込まれていった。
  importance: 100
  svg: art-ww2-outbreak
  category: war
  region: world

- id: 1941-12-08-97e6f8cb
