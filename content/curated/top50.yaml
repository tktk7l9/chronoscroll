  summary: パリのグラン・カフェで、リュミエール兄弟がシネマトグラフによる世界初の有料映画上映を行った。「映画」という20世紀最大の娯楽と芸術の歴史が、ここから始まった。
  importance: 100
  svg: art-cinema-birth
  category: culture
  region: world

- id: 1898-12-26-db659829
