  date: "1945-08-06"
  precision: day
  summary: 8月6日午前8時15分、米軍のB-29が広島市に世界初の原子爆弾を投下した。市街は一瞬で壊滅し、その年のうちに約14万人が亡くなったと推計される。3日後には長崎にも投下された。
  importance: 100
  svg: art-hiroshima
  category: war
  region: japan

- id: 1945-08-15-a6282730
